can中间件
1. 不同优先级can帧（时能，设置pid，设置模式）
2. 不同频率（用户偶发，驱动定时发送，电机定时回复，电机回复紧跟在驱动发送，初始化发送）
3. 作为电机驱动和底层can驱动的中间层，让不同电机can帧趋于平均，保证can通道利用率高便于控制多个电机



代码需求
1. 多级环形缓冲区，应对不同优先级
2. 节拍调度，1000hz，先紧凑发送，再留白给某些电机的定时回复帧，注意某些电机紧跟的发一收1的回复帧，应该留开空间，一帧标准帧130us，扩展帧150us，每帧压入邮箱应该在这个间隔，有紧跟回复的再留出回复时间
3. 特定帧实现查看回复功能，确认电机收到并回复，没收到重发
4. 接收和发送加上全局计数，每两秒logcan占用率
5. 日常控制帧不同电机发送频率可能不同，实现自动排布相位偏移和错峰
6. 暴露api：电机驱动调用的can发送（不同电机can发送类型不同，优先级，是否有紧跟回复，是否有定时回复，发送频率都要作为参数），（还可以修改每个电机驱动的fillter后对应rxcb函数来实现上述功能）



