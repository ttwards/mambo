# 达妙DM电机控制示例配置

# 基础配置
CONFIG_MAIN_THREAD_PRIORITY=7
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_SENSOR=n
CONFIG_BMI08X=n

# 电机驱动支持
CONFIG_MOTOR=y
CONFIG_MOTOR_DM=y

# CAN总线支持
CONFIG_CAN=y
CONFIG_CAN_INIT_PRIORITY=80

# PID控制器支持
CONFIG_PID=y

# This motor sample does not use onboard sensors.
CONFIG_SENSOR=n
CONFIG_BMI08X=n
