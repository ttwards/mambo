description: CAN controller channel hosted by a custom SPI virtual CAN bridge

compatible: "custom,spi-can-node"

include: [can-controller.yaml]

properties:
  can-channel:
    type: int
    required: true
    enum:
      - 0
      - 1
    description: Remote CAN channel index on the parent SPI bridge.
